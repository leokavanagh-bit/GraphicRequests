<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Request — GFX Requests</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="top-nav">
  <img src="GlobalGFX_Logo.svg" class="nav-logo-img" alt="GlobalGFX">
  <div class="nav-divider"></div>
  <button class="nav-btn" onclick="window.location.href='index.html'">← Board</button>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <h1>New Graphic Request</h1>
    <p>A unique Request ID will be generated automatically on submission.</p>
  </div>

  <form id="request-form">
    <div class="form-grid">

      <div class="form-section-title">Request Details</div>

      <div class="form-group full-width">
        <label for="title">Title *</label>
        <input type="text" id="title" name="title" placeholder="Describe the request briefly" required>
      </div>

      <div class="form-group">
        <label for="storyBin">Story Bin</label>
        <input type="text" id="storyBin" name="storyBin" placeholder="Story bin reference">
      </div>

      <div class="form-group">
        <label for="graphicType">Graphic Type</label>
        <select id="graphicType" name="graphicType"></select>
      </div>

      <div class="form-group">
        <label for="destination">Destination</label>
        <select id="destination" name="destination"></select>
      </div>

      <div class="form-group">
        <label for="market">Market</label>
        <select id="market" name="market"></select>
      </div>

      <div class="form-group">
        <label for="show">Show</label>
        <select id="show" name="show"></select>
      </div>

      <div class="form-section-title">Contact</div>

      <div class="form-group">
        <label for="requestedBy">Requested By</label>
        <input type="text" id="requestedBy" name="requestedBy" placeholder="Full name">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="name@globalnews.ca">
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="Extension or direct line">
      </div>

      <div class="form-section-title">Scheduling</div>

      <div class="form-group">
        <label for="quickPick">Quick Pick</label>
        <select id="quickPick" name="quickPick"></select>
      </div>

      <div class="form-group">
        <label for="estimatedTime">Estimated Time</label>
        <input type="text" id="estimatedTime" name="estimatedTime" placeholder="e.g. 2 hours">
      </div>

      <div class="form-group">
        <label for="requiredDate">Required Date</label>
        <input type="date" id="requiredDate" name="requiredDate">
      </div>

      <div class="form-group">
        <label for="dueTime">Due Time</label>
        <input type="text" id="dueTime" name="dueTime" placeholder="e.g. 17:30">
      </div>

      <div class="form-section-title">Content</div>

      <div class="form-group full-width">
        <label for="keywords">Keywords</label>
        <input type="text" id="keywords" name="keywords" placeholder="Comma-separated keywords for search">
      </div>

      <div class="form-group full-width">
        <label for="details">Details</label>
        <textarea id="details" name="details" placeholder="Describe the graphic in full — style, content, references, any specific requirements…"></textarea>
      </div>

      <div class="form-section-title">Attachments</div>

      <div class="drop-zone" id="dropZone">
        <span class="drop-icon">📎</span>
        Drag &amp; drop files here, or <strong>click to browse</strong>
        <div style="font-size:0.72rem;margin-top:5px;color:#bbb;">Images, PDFs, documents accepted</div>
      </div>
      <input type="file" id="fileInput" multiple hidden>

      <div id="file-list"></div>

    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" id="submit-btn">Submit Request</button>
      <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">Cancel</button>
    </div>
  </form>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/app.js"></script>
<script src="js/form.js"></script>
</body>
</html>

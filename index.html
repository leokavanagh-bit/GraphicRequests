<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFX Request Board</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="top-nav">
  <img src="GlobalGFX_Logo.svg" class="nav-logo-img" alt="GlobalGFX">
  <div class="nav-divider"></div>
  <button class="nav-btn primary" onclick="window.location.href='form.html'">+ Create Request</button>
  <button class="nav-btn active" id="btn-all">All</button>
  <button class="nav-btn" id="btn-today">Today</button>
  <button class="nav-btn" id="btn-yesterday">Yesterday</button>
  <button class="nav-btn" id="btn-pm-filter">Project Manager</button>
  <button class="nav-btn" onclick="window.location.href='gallery.html'">Gallery</button>
  <div class="nav-search">
    <input type="text" id="search-input" placeholder="Search ID, title, keyword…">
  </div>
</nav>

<div class="board-wrap">
  <div class="board">

    <div class="board-col">
      <div class="col-header">
        Requested
        <span class="col-count" id="count-requested">0</span>
      </div>
      <div class="col-cards" id="col-requested"></div>
    </div>

    <div class="board-col">
      <div class="col-header">
        Assigned
        <span class="col-count" id="count-assigned">0</span>
      </div>
      <div class="col-cards" id="col-assigned"></div>
    </div>

    <div class="board-col">
      <div class="col-header">
        In Progress
        <span class="col-count" id="count-in-progress">0</span>
      </div>
      <div class="col-cards" id="col-in-progress"></div>
    </div>

    <div class="board-col">
      <div class="col-header">
        Pending Approval
        <span class="col-count" id="count-pending-approval">0</span>
      </div>
      <div class="col-cards" id="col-pending-approval"></div>
    </div>

    <div class="board-col">
      <div class="col-header">
        Approved
        <span class="col-count" id="count-approved">0</span>
      </div>
      <div class="col-cards" id="col-approved"></div>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/app.js"></script>
<script src="js/board.js"></script>
</body>
</html>
